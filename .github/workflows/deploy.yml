name: Deploy site to GitHub Pages

# Publishes the static site in ./site to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → "Build and deployment" → Source =
# "GitHub Actions". After that, every push to main redeploys automatically.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
