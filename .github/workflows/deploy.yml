name: Deploy site to GitHub Pages

# Publishes the static site in ./site to GitHub Pages.
#
# NOTE: GitHub Pages requires either a PUBLIC repo (free) or GitHub Pro for a
# private repo. While this repo is private on the free plan, Pages can't be
# enabled, so this workflow is MANUAL-ONLY (workflow_dispatch) to avoid failing
# on every push. The site is served for free from a private repo via Netlify
# (see ../netlify.toml).
#
# To switch to GitHub Pages later: make the repo public (or upgrade to Pro),
# set Settings → Pages → Source = "GitHub Actions", then uncomment the `push:`
# trigger below so deploys run automatically.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "site/**"
  #     - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Least-privilege token scopes required by the Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
