<!DOCTYPE html>

<title>Lost the way · Ekaterina & Norayr</title>

<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:48px 24px;gap:6px;
    background:linear-gradient(180deg,#2c3019,#222512);color:#f1e9d8;
    font-family:'EB Garamond',serif}
  .eyebrow{font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:#a6843f;margin:0 0 18px}
  h1{margin:0;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(56px,16vw,120px);line-height:.9;letter-spacing:.02em}
  .lead{margin:18px 0 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,3vw,30px);color:#a6843f}
  p{margin:14px 0 0;color:#cfc8b2;max-width:42ch;line-height:1.55}
  a.home{display:inline-flex;align-items:center;gap:9px;margin-top:34px;padding:12px 22px;
    font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    color:#f1e9d8;text-decoration:none;border:1px solid rgba(166,132,63,.5);transition:border-color .3s,background .3s}
  a.home:hover{border-color:#a6843f;background:rgba(166,132,63,.1)}
  a.home:focus-visible{outline:2px solid #a6843f;outline-offset:3px}
</style>
</head>
<body>
  <!-- If you move to a custom apex domain, change the home link below to "/". -->
  <p class="eyebrow">The Long Way Home</p>
  <h1>404</h1>
  <p class="lead">This road doesn't lead home.</p>
  <p>The page you're looking for has wandered off. Let's get you back to Ekaterina &amp; Norayr's celebration.</p>
  <a class="home" href="/Wedding/">Return home</a>
</body>
</html>
